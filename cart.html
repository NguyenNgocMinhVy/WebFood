<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giỏ Hàng</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
   <link rel="stylesheet" href="css/style.css">
  <!-- CSS (đã tinh gọn & bao gồm style cơ bản chung) -->
</head>
<body>
  <!-- Header từ layout.js sẽ chèn vào đây -->
  <div id="main-header"></div>

  <!-- Nội dung chính -->
  <main class="main-container">
    <table id="cart-table">
      <thead>
        <tr>
          <th>Sản phẩm</th>
          <th>Giá</th>
          <th>Số lượng</th>
          <th>Thành tiền</th>
          <th>Xoá</th>
        </tr>
      </thead>
      <tbody>
        <!-- sẽ được render bằng JavaScript -->
      </tbody>
    </table>

    <div class="cart-summary">
      <h3>Tổng tiền: <span id="total-price">0</span> đ</h3>
      <button onclick="goToCheckout()">Thanh toán</button>
    </div>
  </main>

  <!-- Footer từ layout.js sẽ chèn vào đây -->
  <div id="main-footer"></div>

  <!-- JavaScript -->
  <script src="js/layout.js"></script>
  <script>
    // Nội dung xử lý giỏ hàng
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    const tbody = document.querySelector("#cart-table tbody");
    const totalEl = document.getElementById("total-price");

    function renderCart() {
      tbody.innerHTML = "";
      let total = 0;

      if (cart.length === 0) {
        const row = document.createElement("tr");
        const cell = document.createElement("td");
        cell.colSpan = 5;
        cell.textContent = "Giỏ hàng của bạn đang trống.";
        cell.style.textAlign = "center";
        cell.style.fontStyle = "italic";
        row.appendChild(cell);
        tbody.appendChild(row);
      } else {
        cart.forEach((item, index) => {
          const row = document.createElement("tr");
          const subtotal = item.price * item.quantity;
          total += subtotal;

          row.innerHTML = `
            <td>${item.name}</td>
            <td>${item.price.toLocaleString()} đ</td>
            <td>
              <input type="number" min="1" value="${item.quantity}" onchange="changeQuantity(${index}, this.value)">
            </td>
            <td>${subtotal.toLocaleString()} đ</td>
            <td><button onclick="removeItem(${index})">❌</button></td>
          `;

          tbody.appendChild(row);
        });
      }

      totalEl.textContent = total.toLocaleString();
      localStorage.setItem("cart", JSON.stringify(cart));
    }

    function changeQuantity(index, newQty) {
      cart[index].quantity = Math.max(1, parseInt(newQty) || 1);
      renderCart();
    }

    function removeItem(index) {
      cart.splice(index, 1);
      renderCart();
    }

    function goToCheckout() {
      if (cart.length === 0) {
        alert("Giỏ hàng của bạn đang trống. Vui lòng thêm sản phẩm để thanh toán.");
        return;
      }
      localStorage.setItem("cart", JSON.stringify(cart));
      window.location.href = "thanhtoan.html";
    }

    renderCart();
  </script>
</body>
</html>
