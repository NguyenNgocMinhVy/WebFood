<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chi tiết Sản Phẩm</title>
  <meta name="author" content="Minh Vy" />
  <link rel="stylesheet" href="css/style.css" />
  
</head>
<body>


  <div id="main-header"></div>


  <section class="product-detail">
    <img id="product-img" class="detail-img" alt="Sản phẩm">
    <div class="detail-info">
      <h2 id="product-name"></h2>
      <p id="product-price"></p>

      <label for="quantity" class="quantity-label">Số lượng:</label>
      <input type="number" id="quantity" value="1" min="1">
      <div id="option-wrapper" style="margin-bottom: 20px; display: none;">
  <label for="product-option" class="quantity-label">Chọn loại:</label>
  <select id="product-option" style="padding: 10px; border-radius: 8px; border: 1px solid #aaa; margin-top: 10px;">
 
  </select>
</div>

      <button onclick="addToCart()">Thêm vào giỏ hàng</button>

      <div class="product-description">
        <p class="description-text" id="product-description"></p>
      </div>
    </div>
  </section>

  <div id="main-footer"></div>

  <script src="js/layout.js"></script>
  <script src="js/product.js"></script>
  <script>
    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

   window.onload = function () {
  const productId = getQueryParam("product");
  const product = products[productId];

  if (!product) {
    document.body.innerHTML = "<h2 style='text-align:center; padding: 50px;'>Sản phẩm không tồn tại. <a href='index.html'>Quay lại</a>.</h2>";
    return;
  }

  document.title = product.name;
  document.getElementById("product-name").innerText = product.name;
  document.getElementById("product-price").innerText = `Giá: ${product.price.toLocaleString('vi-VN')}đ`;
  document.getElementById("product-img").src = product.image;
  document.getElementById("product-img").alt = product.name;
  document.getElementById("product-description").innerText = product.description;

 
  if (product.options && product.options.length > 0) {
    const wrapper = document.getElementById("option-wrapper");
    const select = document.getElementById("product-option");
    wrapper.style.display = "block";

    product.options.forEach(opt => {
      const option = document.createElement("option");
      option.value = opt;
      option.innerText = opt;
      select.appendChild(option);
    });
  }
};
function addToCart() {
  const productId = getQueryParam("product");
  const productData = products[productId];
  const quantity = parseInt(document.getElementById("quantity").value);
  const selectedOption = document.getElementById("product-option")?.value || null;

  if (!productData) {
    alert("Sản phẩm không hợp lệ.");
    return;
  }

  const cartItem = {
    name: productData.name + (selectedOption ? ` (${selectedOption})` : ''),
    price: productData.price,
    quantity: quantity
  };

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  const existing = cart.find(item => item.name === cartItem.name);
  if (existing) {
    existing.quantity += cartItem.quantity;
  } else {
    cart.push(cartItem);
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Đã thêm vào giỏ hàng!");
  window.location.href = "cart.html";
}

  </script>
</body>
</html>
