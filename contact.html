<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Liên Hệ - Ăn Vặt Minh Phát</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/contact.css" />
</head>
<body>

  <!-- Header (chèn từ layout.js) -->
  <div id="main-header"></div>

  <!-- Nội dung chính -->
  <main class="main-container">
    <h1>Liên hệ với chúng tôi</h1>

    <div class="thong-tin">
      <p><strong>📞 Điện thoại:</strong> 0855 77 3933</p>
      <p><strong>📧 Email:</strong> anvatminhphat@gmail.com</p>
      <p><strong>🕒 Thời gian làm việc:</strong> 24/7</p>
    </div>

    <form action="https://formsubmit.co/anvatminhphat@gmail.com" method="POST">
      <input type="hidden" name="_captcha" value="false" />
      <input type="hidden" name="_next" value="http://127.0.0.1:5500/thank.html" />

      <label for="hoten">Họ và tên:</label>
      <input type="text" id="hoten" name="hoten" placeholder="Nguyễn Văn A" required />

      <label for="sdt">Số điện thoại:</label>
      <input type="tel" id="sdt" name="sdt" placeholder="0912345678" required />

      <label for="email">Email (nếu có):</label>
      <input type="email" id="email" name="email" placeholder="email@gmail.com" />

      <label for="noidung">Nội dung:</label>
      <textarea id="noidung" name="noidung" placeholder="Tôi muốn hỏi về sản phẩm..." rows="5" required></textarea>

      <button type="submit">Gửi liên hệ</button>
    </form>
  </main>

  <!-- Footer -->
  <div id="main-footer"></div>

  <!-- JS để tự động chèn header/footer -->
  <script src="js/layoutcontact.js"></script>
</body>
</html>
