<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đặt Trước Món Mới - Ăn Vặt Minh Phát</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/disc.css">
  
</head>
<body>

<header class="site-header">
  <div class="logo">
   <a href="index.html">
                <img src="picture/tải xuống.png"Logo Ăn Vặt Minh Phát" class="logo">
  </div>
  <nav class="navbar">
    <ul>
     
      <li><a href="cart.html">Giỏ Hàng</a></li>
      <li><a href="contact.html">Liên hệ</a></li>
    </ul>
  </nav>
</header>

<div class="main-container">
  <h1>Đặt Trước Món Mới</h1>
  <form action="https://formsubmit.co/anvatminhphat@gmail.com" method="POST">
    <input type="hidden" name="_captcha" value="false" />
    <input type="hidden" name="_next" value="http://127.0.0.1:5500/thankcod.html" />

    <label for="hoten">Họ và tên:</label>
    <input type="text" id="hoten" name="hoten" placeholder="Nguyễn Văn A" required />

    <label for="sdt">Số điện thoại:</label>
    <input type="tel" id="sdt" name="sdt" placeholder="0912345678" required pattern="[0-9]{10,12}" />

    <label for="email">Email (nếu có):</label>
    <input type="email" id="email" name="email" placeholder="email@gmail.com" />

    <label for="noidung">Địa chỉ giao hàng:</label>
    <textarea id="noidung" name="noidung" placeholder="Số nhà, đường, phường/xã, quận/huyện, thành phố" rows="5" required></textarea>

    <button type="submit">Đặt trước ngay</button>
  </form>
</div>

<script src="js/disc.js"></script>

</body>
</html>
